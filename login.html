<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
.login-box {
  max-width: 400px;
  margin: 100px auto;
  text-align: center;
}

.login-box input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
}

.login-box button {
  width: 100%;
  padding: 12px;
  background: gold;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

  <main>

<header class="navbar">

<h1 class="logo">Styles By Tiwa</h1>

</header>

<div class="login-box">

<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button type="button" onclick="login()">Login</button>

</div>

  </main>

<script>
const supabaseClient = supabase.createClient(
  "https://zlglsosfzrybgfuvwldk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsZ2xzb3NmenJ5YmdmdXZ3bGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NDY0MDksImV4cCI6MjA4OTMyMjQwOX0.-F8BTkb-x1ZM8PvvYbE8p58o6rStxMigGGTzPma-AmM"
);

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Enter email and password");
    return;
  }

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    console.error(error);
    alert("Login failed ❌");
  } else {
    alert("Login successful ✅");
    window.location.href="tiwa-admin-dashboard.html";
  }
}
</script>
